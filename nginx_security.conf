# ═══════════════════════════════════════════════════════════════
# 乡亲 · VPS Nginx 安全配置（修复版 v5 - 强制 HTTPS）
# 部署位置: /etc/nginx/conf.d/xiangqin-relay.conf
# ═══════════════════════════════════════════════════════════════

log_format xiangqin '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent"';

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name xiangqin.whanghui.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xiangqin.whanghui.top;

    ssl_certificate /etc/letsencrypt/live/whanghui.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whanghui.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/access.log xiangqin;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; media-src 'self'; object-src 'none'" always;
    server_tokens off;

    location ~* \.map$ { deny all; return 404; }
    location = /api/login/status { deny all; return 404; }
    location = /api/legal/privacy { deny all; return 401; }
    location = /api/legal/agreement { deny all; return 401; }
    location ~ /\. { deny all; return 404; }

    location /ws/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location /video/receive/ {
        proxy_pass http://127.0.0.1:8766/video/receive/;
        client_max_body_size 500m;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /api/login {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;
        limit_conn conn 5;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin "https://xiangqin.whanghui.top" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location /uploads/ {
        alias /opt/relay/uploads/;
        add_header Access-Control-Allow-Origin "https://xiangqin.whanghui.top" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes;
    }

    location / {
        root /opt/relay/static;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
